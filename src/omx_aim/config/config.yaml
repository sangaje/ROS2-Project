# OMX 통합 설정 파일
#
# 이 파일을 수정해서 캘리브레이션, 게인, 한계 등을 조정합니다.
# 코드 수정 불필요.
#
# 환경별로 여러 파일 사용 가능:
#   configs/desktop.yaml  (개발용)
#   configs/raspi.yaml    (와플 통합용)

# ===========================================================
# 모터 통신 / 속도
# ===========================================================
motor:
  port: /dev/omx_follower
  profile_velocity: 100        # 0 = 최대속도(위험). 30 = 매우 천천히
  profile_acceleration: 10

  # elbow_flex PID (omx_follower 기본값)
  elbow_p_gain: 1500
  elbow_i_gain: 0
  elbow_d_gain: 600


# ===========================================================
# 캘리브레이션 (실측 후 조정)
# ===========================================================

calibration:
  # 각 joint 가 0 rad 일 때의 raw tick.
  # `--measure-home` 모드로 측정한 값을 여기 박아넣으세요.
  home:
    shoulder_pan:  2048
    shoulder_lift: 1055
    elbow_flex:    3050
    wrist_flex:    2048
    # wrist_roll:    2024
    # gripper:       3217

  # 회전 방향 부호. 검증 후 반대로 돌면 -1 로 뒤집기.
  sign:
    shoulder_pan:  1
    shoulder_lift: -1
    elbow_flex:    1
    wrist_flex:    1
    # wrist_roll:    1


# ===========================================================
# 안전 한계
# ===========================================================
safety:
  # 관절별 안전 각도 범위 (도 단위). IK 결과가 이 범위 밖이면 clamp.
  angle_limits_deg:
    shoulder_pan:  [-180,  180]
    shoulder_lift: [-30,  30]
    elbow_flex:    [-90,  90]
    wrist_flex:    [-90,  90]
    wrist_roll:    [-180, 180]

  # IBVS 한 step 당 최대 변화 (도)
  max_step_deg: 2.0

  # 한 번에 이 tick 이상 움직이는 명령은 사용자 확인 요구
  large_delta_threshold_tick: 500


# ===========================================================
# 키보드 teleop
# ===========================================================
keyboard:
  arm_step: 13              # 키 한 번에 raw tick (joint 1~5)
  gripper_step: 25          # 키 한 번에 raw tick (gripper)
  command_interval: 0.02    # 명령 간 최소 간격 (초)


# ===========================================================
# IBVS (visual servoing)
# ===========================================================
ibvs:
  camera_index: 0
  # A stable /dev/v4l/by-id/... path is preferred when available. Empty keeps
  # the legacy integer camera_index behavior.
  camera_device: ""
  camera_backend: "v4l2"
  camera_reconnect_period_sec: 1.0
  camera_required: false
  camera_width: 1280
  camera_height: 720
  camera_fps: 15.0
  camera_fourcc: "MJPG"
  camera_buffer_size: 1
  kp_yaw:   0.05            # 비례 게인 (rad / normalized error)
  kp_pitch: 0.03
  sign_vs_x: -1             # 카메라 마운팅에 따른 부호
  sign_vs_y: -1
  deadband_x:  0.015       # 화면 폭의 1.5%; 너무 크면 PD가 멈춘다
  deadband_y:  0.015       # x축과 동일 (정사각형 데드밴드)
  # 조준 기준점을 화면 정중앙보다 아래/오른쪽으로 둔다.
  # 0.20은 720p 기준 약 72px 아래, 0.08은 1280p 폭 기준 약 51px 오른쪽.
  aim_target_offset_y_norm: 0.20
  aim_target_offset_x_norm: 0.08
  control_hz:  25.0         # 제어 주기
  # ----- 움직이는 표적 추적 (Phase B) -----
  # 0 = 순수 P (정적 표적, 기존 동작과 동일)
  # 권장 시작값: kp * 0.1 정도부터 점진적으로
  kd_yaw:   0.01
  kd_pitch: 0.01

  # EMA 필터 (de/dt 노이즈 완화)
  # 1.0 = 필터 없음, 0.3~0.5 = 권장, 0.1 = 매우 부드러움
  derivative_ema_alpha: 0.4

  # 미분 상태 자동 reset 기준 (TRACKING 재진입 케이스)
  derivative_reset_gap_sec: 0.5

yolo:
  # model/target_v3.engine 표적용 고속 기본값. 별도 학습 가중치는 런치의
  # yolo_node_model_path로 명시적으로 지정한다.
  model_path: model/target_v3.engine
  device: 0                 # Jetson CUDA device. cpu로 강제하려면 "cpu"
  half: true                # CUDA에서 FP16 사용
  target_class: 0           # target_v3 클래스 0 = 표적 (실기 테스트로 확인됨)
  conf_threshold: 0.3        # 0.0~1.0. 낮을수록 더 많이 검출 (오검출 늘어남)
  imgsz: 640                 # target_v3.engine 고정 입력 해상도와 반드시 일치

# ===========================================================
# 격발 & 상태 머신
# ===========================================================
fire:
  # 격발 직전 확인 (CONFIRMING 상태)
  hold_time_sec: 0.35           # deadband 안 유지 시간
  confirm_deadband_scale: 1.8   # 확인 중 잔진동 허용 폭
  aim_settle_sec: 0.7

  # 격발 펄스 동안 조준 유지 시간 (fire_node 의 fire_duration_sec 와 일치 권장)
  # 이 시간 동안 OMX 는 조준 자세를 유지하고, 끝나면 home 으로 복귀.
  # cooldown_sec 보다 작아야 의미 있음.
  fire_pulse_sec: 1.5

  # 격발 동작 (gripper 시뮬레이션)
  gripper_close_pos: 1000       # 격발 시 gripper raw tick
  gripper_open_pos: 3217        # 격발 후 위치 (보통 home 값)
  gripper_close_duration: 0.3   # 닫기 동작 시간
  gripper_open_duration: 0.3    # 열기 동작 시간

  # 격발 후 cooldown (FIRING 진입 후 총 휴지 시간)
  # 흐름: fire_pulse_sec 동안 조준 유지 → home 이동 → 나머지 시간 휴지 → IDLE
  cooldown_sec: 3.0
  # 표적이 잠깐 사라져도 바로 scan_sweep 로 복귀하지 않고, 현재 조준 자세를
  # 유지하며 재검출을 기다린다.
  lost_timeout_sec: 3.0

  # 탐지 즉시 격발 경로는 사용하지 않는다. 표적이 보이면 TRACKING 으로 들어가
  # IBVS 로 조준하고, deadband 안에서 hold_time_sec 동안 유지된 뒤
  # CONFIRMING -> FIRING 으로만 격발한다.
# ===========================================================
# Auto-track (자율 검출)
# ===========================================================
autotrack:
  # IDLE 상태에서 카메라가 표적 검출 시 자율 추적 시작?
  # true: 별도 무장 없이 부팅 즉시 armed 상태로 시작.
  # 탐지 시 바로 TRACKING/PD 조준에 들어가며, 격발 경로는
  # CONFIRMING/FIRING 상태에서만 열린다.
  # /omx/arm_enable 로 언제든 false 로 다시 잠글 수 있음.
  default_armed: true
  
  # 중복 표적 방지: 처리한 표적 좌표와 비교
  duplicate_threshold_m: 0.5    # 이 거리 안 표적은 중복 간주

# 기존 config.yaml 끝에 추가할 patrol 섹션
 
# ===========================================================
# 정찰 + 우선순위 큐
# ===========================================================
patrol:
  scan_timeout_sec: 2.0
  target_scan_timeout_sec: 5.0
  boundary_scan_timeout_sec: 0.35
  boundary_aim_settle_sec: 0.05
  # scan_sweep 는 continuous triangle-wave 목표를 써서 좌우로 천천히 훑는다.
  # period_sec 를 늘리면 더 느리게 왕복한다.
  scan_sweep_half_angle_deg: 60.0
  scan_sweep_period_sec: 5.0
  # 남아있는 risk map을 리더 OMX 시야로 지우기 위해, 스캔 중심을 가장
  # 높은 risk 방향으로 끌고 간다. target/focus가 없으면 정면으로 폴백.
  risk_scan_enabled: true
  risk_map_topic: "/risk/risk_map"
  risk_scan_min_value: 8
  risk_scan_max_distance_m: 4.0
  risk_scan_center_yaw_limit_deg: 80.0
  risk_scan_sample_stride: 4
  max_queue_size: 20
  duplicate_threshold_m: 0.3
  los_check_enabled: true
  los_cost_threshold: 80
  costmap_topic: "/global_costmap/costmap"
  
  publish_queue_markers: true
  marker_lifetime_sec: 2.0

# ===========================================================
# 와플 (Nav2 클라이언트)
# ===========================================================
waffle:
  frame: "map"
  nav_action_name: "/navigate_to_pose"
  # H2 부터 사용 예정 (지금은 빈자리)
  # stand_off_distance: 1.0
  # omx_timeout_sec: 30.0

# ===========================================================
# CHECK_VIEW 판정 + VIEW_POSE v1 계산 (H2)
# ===========================================================
view_pose:
  omx_yaw_limit_deg: 180.0
  min_distance_m: 0.3
  max_distance_m: 3.0
  stand_off_distance: 1.5
  candidate_count: 12
  yaw_next_weight: 0.0
  footprint_radius_m: 0.24
  min_known_footprint_ratio: 0.45
  reject_unknown_footprint: false
  require_clear_path_to_candidate: false
  allow_unknown_target_los: true
  frontier_bonus: 0.35
  obstacle_cost_weight: 1.5
  unknown_cost_weight: 0.8

# ===========================================================
# VIEW_POSE 이동을 A* 짧은 구간 연속 이동으로 대체 (H5.1)
# ===========================================================
nav_crawl:
  enabled: false
  # A* 탐색 - 낮은 cost 셀을 선호하되 완전히 막지는 않음 (돌아가더라도 안전 우선)
  astar_obstacle_cost_weight: 2.0
  astar_allow_unknown: false
  astar_max_iterations: 20000
  astar_search_margin_m: 2.0
  # 거리 등분 대신 누적 회전량 기준으로 waypoint 를 나눔: 회전이 많으면
  # 짧게(자주 재평가/보정), 회전이 없는 직선 구간은 waypoint 없이 길게.
  # waypoint_min_spacing_m 은 A* 그리드 계단식 패턴 때문에 매 셀마다
  # waypoint 가 과하게 촘촘히 찍히지 않게 막는 최소 간격일 뿐(목표 간격
  # 아님). waypoint_turn_angle_rad 는 이 각도(라디안, 기본 약 35도)만큼
  # 누적 회전하면 새 waypoint 를 찍는다는 뜻.
  waypoint_min_spacing_m: 0.25
  waypoint_turn_angle_rad: 0.6108652381980153
  waypoint_tolerance_m: 0.35
  # 이 주기로 진행 상황/조기 종료(LOS) 재평가
  refresh_period_sec: 0.5
  # A* 실제 경로 길이가 직선거리의 이 배수를 넘으면 후보 폐기(가깝지만 벽 넘어 있는 경우)
  reachability_max_ratio: 1.6
  early_stop_on_los: true

# ===========================================================
# BOUNDARY 자동 생성
# ===========================================================
boundary:
  enable_during_target: true     # 런타임 토픽으로 토글 가능
  enable_during_patrol: true
  
  fan_half_angle_deg: 45.0       # ± 이 각도 (좌우 합 90° fan)
  angle_step_deg: 22.5
  distance_m: 1.5
  z: 0.00
  period_sec: 0.5
  max_queue_size: 10
  ttl_sec: 10.0

amcl:
  ros__parameters:
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
