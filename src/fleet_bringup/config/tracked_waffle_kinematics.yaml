tracked_waffle_kinematics:
  ros__parameters:
    physical_wheel_radius: 0.040
    effective_wheel_radius: 0.040
    physical_track_separation: 0.287
    effective_track_separation: 0.447
    opencr_kinematics_corrected: false

    calibration:
      minimum_straight_distance: 2.0
      rotation_test_turns: 5
      repetitions: 3

/**:
  turtlebot3_node:
    ros__parameters:
      enable_stamped_cmd_vel: true

      opencr:
        id: 200
        baud_rate: 1000000
        protocol_version: 2.0

      # Effective track parameters for the real tracked Waffle chassis.
      # The physical track spacing is still about 0.287 m, but scrub during
      # differential turns makes the effective separation much larger.
      wheels:
        separation: 0.447
        radius: 0.040

      motors:
        profile_acceleration_constant: 214.577
        profile_acceleration: 0.0

      sensors:
        bumper_1: 0
        bumper_2: 0
        illumination: 0
        ir: 0
        sonar: 0

  diff_drive_controller:
    ros__parameters:
      odometry:
        publish_tf: true
        # Keep the operational profile on IMU yaw. Wheel separation still
        # affects wheel-only calibration runs and encoder-based twist.
        use_imu: true
        frame_id: "odom"
        child_frame_id: "base_footprint"

tracked_cmd_vel_adapter:
  ros__parameters:
    # Fallback path used only while OpenCR firmware still assumes the stock
    # Waffle geometry. After OpenCR is flashed with r=0.040/L=0.447, set
    # enabled=false and gains back to 1.0 in this same file.
    enabled: true
    input_topic: "/cmd_vel_nav"
    output_topic: "/cmd_vel"
    enable_stamped_cmd_vel: true

    linear_gain: 0.825
    angular_gain: 1.286

    max_linear_velocity: 0.22
    max_angular_velocity: 0.9

    max_linear_acceleration: 0.16
    max_angular_acceleration: 0.6

    command_timeout_sec: 0.5
    control_rate_hz: 30.0
    diagnostic_topic: "/tracked_cmd_vel_adapter/status"
    diagnostic_period_sec: 1.0
