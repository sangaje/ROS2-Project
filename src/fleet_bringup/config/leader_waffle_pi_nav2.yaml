# Waffle Pi leader Nav2 config.
# Based on waffle_pi.yaml, adapted for the leader's external-map AMCL mode:
# /map is supplied by the scout through domain_bridge -> map_relay. The launch
# file rewrites every LaserScan consumer to localization_scan_topic, which
# defaults to raw /scan so AMCL can start even when optional /scan_filtered is
# not running.

amcl:
  ros__parameters:
    use_sim_time: true
    # The leader Waffle Pi is heavier/slower than the nominal TB3 model.  Its
    # commanded rotation/acceleration can lag the odom model, so let AMCL trust
    # odom a little less and smooth corrections over real scan evidence.
    alpha1: 0.38
    alpha2: 0.18
    alpha3: 0.23
    alpha4: 0.32
    alpha5: 0.08
    base_frame_id: "base_footprint"
    beam_skip_distance: 0.35
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    first_map_only: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.5
    laser_max_range: 4.0
    laser_min_range: 0.12
    laser_model_type: "likelihood_field"
    max_beams: 180
    max_particles: 8000
    min_particles: 2000
    odom_frame_id: "odom"
    pf_err: 0.015
    pf_z: 0.99
    recovery_alpha_fast: 0.10
    recovery_alpha_slow: 0.001
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 5.0
    sigma_hit: 0.08
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.025
    update_min_d: 0.025
    z_hit: 0.86
    z_max: 0.03
    z_rand: 0.09
    z_short: 0.03
    scan_topic: scan
    map_topic: map
    set_initial_pose: false
    always_reset_initial_pose: false
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: true
    autostart: true
    bond_timeout: 8.0
    node_names: ["amcl"]

controller_server:
  ros__parameters:
    use_sim_time: true
    # The leader is a loaded Waffle Pi, not a fresh nominal model.  Use slower
    # accelerations and longer trajectory rollout so DWB chooses commands the
    # hardware can actually realize instead of constantly asking for impossible
    # catch-up motion.
    controller_frequency: 15.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 4.0
    odom_topic: "/odom"
    enable_stamped_cmd_vel: true
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.025
      movement_time_allowance: 80.0

    goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.35
      yaw_goal_tolerance: 0.60

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true
      min_vel_x: -0.08
      min_vel_y: 0.0
      max_vel_x: 0.20
      max_vel_y: 0.0
      # Keep rotation below the range where the loaded chassis arcs wide and
      # diverges from the differential-drive model.
      max_vel_theta: 0.75
      min_speed_xy: 0.0
      max_speed_xy: 0.20
      min_speed_theta: 0.0
      acc_lim_x: 0.70
      acc_lim_y: 0.0
      acc_lim_theta: 1.40
      decel_lim_x: -0.90
      decel_lim_y: 0.0
      decel_lim_theta: -1.60
      vx_samples: 20
      vy_samples: 1
      vtheta_samples: 32
      sim_time: 1.2
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.5
      xy_goal_tolerance: 0.35
      trans_stopped_velocity: 0.03
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.10
      PathAlign.scale: 20.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 20.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 10.0
      RotateToGoal.slowing_factor: 2.0
      RotateToGoal.lookahead_time: -1.0

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 10.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: false

behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: "/local_costmap/costmap_raw"
    global_costmap_topic: "/global_costmap/costmap_raw"
    local_footprint_topic: "/local_costmap/published_footprint"
    global_footprint_topic: "/global_costmap/published_footprint"
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait", "assisted_teleop"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    local_frame: "odom"
    global_frame: "map"
    robot_base_frame: "base_footprint"
    transform_tolerance: 0.5
    transform_timeout: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.75
    min_rotational_vel: 0.12
    rotational_acc_lim: 1.40
    enable_stamped_cmd_vel: true

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: "map"
    robot_base_frame: "base_footprint"
    odom_topic: "/odom"
    transform_tolerance: 0.5
    filter_duration: 0.3
    always_reload_bt_xml: false
    goal_blackboard_id: goal
    goals_blackboard_id: goals
    path_blackboard_id: path
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_name_prefixes:
      - assisted_teleop
      - backup
      - compute_path
      - dock_robot
      - drive_on_heading
      - follow_path
      - nav_thru_poses
      - nav_to_pose
      - spin
      - route
      - undock_robot
      - wait

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: "odom"
      robot_base_frame: "base_footprint"
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      footprint: "[[-0.24, -0.19], [0.10, -0.19], [0.10, 0.19], [-0.24, 0.19]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # The tracked Waffle must leave more side clearance than the nominal
        # TB3 footprint. Keep local inflation firm enough that DWB does not
        # choose wall-hugging trajectories, but still smaller than global
        # inflation so narrow rooms remain traversable.
        inflation_radius: 0.45
        cost_scaling_factor: 3.0
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: "/scan_filtered"
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          inf_is_valid: true
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: "map"
      robot_base_frame: "base_footprint"
      transform_tolerance: 0.5
      footprint: "[[-0.24, -0.19], [0.10, -0.19], [0.10, 0.19], [-0.24, 0.19]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: "/map"
        map_subscribe_transient_local: true
        transform_tolerance: 0.1
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: "/scan_filtered"
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          inf_is_valid: true
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.70
        cost_scaling_factor: 2.0
      always_send_full_costmap: true

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: true
    bond_timeout: 8.0
    node_names: ["controller_server", "planner_server", "behavior_server", "bt_navigator"]
