slam_toolbox:
  ros__parameters:
    use_sim_time: false
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    mode: mapping

    # Real TurtleBot3 LDS-01/LDS-02 practical range.  Avoid the default 20 m
    # setting, which makes slam_toolbox over-trust far readings that the sensor
    # cannot provide.
    max_laser_range: 3.5
    resolution: 0.05

    # More responsive map publication for live teleoperation/exploration.
    map_update_interval: 0.5
    transform_publish_period: 0.02
    minimum_time_interval: 0.05
    transform_timeout: 0.5
    tf_buffer_duration: 30.0

    throttle_scans: 1
    stack_size_to_use: 40000000
    enable_interactive_mode: false

    # Ceres defaults, kept explicit so behavior is reproducible.
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None
