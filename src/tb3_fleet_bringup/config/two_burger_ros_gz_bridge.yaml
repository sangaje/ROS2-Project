# v17 ROS <-> Gazebo bridge for mixed TurtleBot3 models:
#   burger : TurtleBot3 Burger model, entity name "burger"
#   waffle : TurtleBot3 Waffle model if available, otherwise Waffle Pi fallback, entity name "waffle"
#
# Public ROS command API is TwistStamped only:
#   /burger/cmd_vel  geometry_msgs/msg/TwistStamped
#   /waffle/cmd_vel  geometry_msgs/msg/TwistStamped
#
# The local converter republishes to two internal Twist routes per robot:
#   /burger/gz_cmd_vel_unstamped       -> GZ /burger/cmd_vel
#   /burger/gz_cmd_vel_model_unstamped -> GZ /model/burger/cmd_vel
#   /waffle/gz_cmd_vel_unstamped       -> GZ /waffle/cmd_vel
#   /waffle/gz_cmd_vel_model_unstamped -> GZ /model/waffle/cmd_vel

- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

- ros_topic_name: "/burger/gz_cmd_vel_unstamped"
  gz_topic_name: "/burger/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

- ros_topic_name: "/burger/gz_cmd_vel_model_unstamped"
  gz_topic_name: "/model/burger/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

- ros_topic_name: "/burger/odom"
  gz_topic_name: "/model/burger/odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

- ros_topic_name: "/burger/scan"
  gz_topic_name: "/world/default/model/burger/link/base_scan/sensor/hls_lfcd_lds/scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

- ros_topic_name: "/waffle/gz_cmd_vel_unstamped"
  gz_topic_name: "/waffle/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

- ros_topic_name: "/waffle/gz_cmd_vel_model_unstamped"
  gz_topic_name: "/model/waffle/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

- ros_topic_name: "/waffle/odom"
  gz_topic_name: "/model/waffle/odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

- ros_topic_name: "/waffle/scan"
  gz_topic_name: "/world/default/model/waffle/link/base_scan/sensor/hls_lfcd_lds/scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS
