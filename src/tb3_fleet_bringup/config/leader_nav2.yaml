# Narrow-space Nav2 tuning for the Waffle leader.
# The footprint follows the TurtleBot3 footprint instead of an oversized circle.

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 2.0
    odom_topic: "/odom_nav"
    enable_stamped_cmd_vel: true
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.025
      movement_time_allowance: 45.0

    general_goal_checker:
      stateful: false
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.50

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false
      min_vel_x: -0.06
      min_vel_y: 0.0
      max_vel_x: 0.20
      max_vel_y: 0.0
      max_vel_theta: 1.00
      min_speed_xy: 0.0
      max_speed_xy: 0.20
      min_speed_theta: 0.0
      acc_lim_x: 1.0
      acc_lim_y: 0.0
      acc_lim_theta: 2.2
      decel_lim_x: -1.0
      decel_lim_y: 0.0
      decel_lim_theta: -2.2
      vx_samples: 28
      vy_samples: 1
      vtheta_samples: 40
      sim_time: 1.2
      linear_granularity: 0.025
      angular_granularity: 0.02
      transform_tolerance: 1.5
      xy_goal_tolerance: 0.15
      trans_stopped_velocity: 0.03
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.03
      PathAlign.scale: 20.0
      PathAlign.forward_point_distance: 0.08
      GoalAlign.scale: 14.0
      GoalAlign.forward_point_distance: 0.08
      PathDist.scale: 24.0
      GoalDist.scale: 16.0
      RotateToGoal.scale: 16.0
      RotateToGoal.slowing_factor: 3.0
      RotateToGoal.lookahead_time: -1.0

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.20
      use_astar: true
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: "/local_costmap/costmap_raw"
    global_costmap_topic: "/global_costmap/costmap_raw"
    local_footprint_topic: "/local_costmap/published_footprint"
    global_footprint_topic: "/global_costmap/published_footprint"
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    global_frame: "map"
    robot_base_frame: "base_footprint"
    transform_tolerance: 1.5
    simulate_ahead_time: 1.5
    max_rotational_vel: 1.00
    min_rotational_vel: 0.1
    rotational_acc_lim: 2.2

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: "map"
    robot_base_frame: "base_footprint"
    odom_topic: "/odom_nav"
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: "odom"
      robot_base_frame: "base_footprint"
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      # SDF body: x=[-0.1965, 0.0685], wheels y=+-0.153.
      # This adds about 1 cm clearance without throwing away corridor width.
      footprint: "[[-0.21, -0.16], [0.08, -0.16], [0.08, 0.16], [-0.21, 0.16]]"
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 8.0
        inflation_radius: 0.32
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: false
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: "/scan_nav"
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.5
          raytrace_min_range: 0.0
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: "map"
      robot_base_frame: "base_footprint"
      footprint: "[[-0.21, -0.16], [0.08, -0.16], [0.08, 0.16], [-0.21, 0.16]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: "/map"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 8.0
        inflation_radius: 0.34
      always_send_full_costmap: true

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ""

lifecycle_manager_map:
  ros__parameters:
    use_sim_time: true
    autostart: true
    bond_timeout: 8.0
    node_names: ["map_server"]

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: true
    bond_timeout: 8.0
    node_names: ["controller_server", "planner_server", "behavior_server", "bt_navigator"]
