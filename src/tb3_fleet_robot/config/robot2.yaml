robot_goal_proxy:
  ros__parameters:
    robot_name: waffle
    goal_topic: /fleet/waffle/goal_pose
    hold_topic: /fleet/waffle/hold
    cancel_topic: /fleet/waffle/cancel
    status_topic: /fleet/waffle/status
    navigate_action: /navigate_to_pose
    cancel_previous_goal: true
    wait_for_server_sec: 10.0

robot_pose_reporter:
  ros__parameters:
    robot_name: waffle
    map_frame: map
    base_frame: base_footprint
    pose_topic: /fleet/waffle/pose
    publish_period_sec: 0.10
