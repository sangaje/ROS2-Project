robot_goal_proxy:
  ros__parameters:
    robot_name: burger
    goal_topic: /fleet/burger/goal_pose
    hold_topic: /fleet/burger/hold
    cancel_topic: /fleet/burger/cancel
    status_topic: /fleet/burger/status
    navigate_action: /navigate_to_pose
    cancel_previous_goal: true
    wait_for_server_sec: 10.0

robot_pose_reporter:
  ros__parameters:
    robot_name: burger
    map_frame: map
    base_frame: base_footprint
    pose_topic: /fleet/burger/pose
    publish_period_sec: 0.10
